name: Claude

# 친구가 이슈/PR에 "@claude ..."라고 쓰면 Claude가 코드를 읽고 수정해 PR을 올립니다.
# 인증은 네 Claude 구독 토큰(CLAUDE_CODE_OAUTH_TOKEN)을 사용 → 유료 API 요금이 아니라 구독으로 처리.
#   토큰 만들기: 로컬에서  claude setup-token  실행 → 나온 토큰을
#   저장소 Settings → Secrets and variables → Actions → New repository secret
#   이름 CLAUDE_CODE_OAUTH_TOKEN 으로 등록.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # @claude 가 실제로 언급된 경우에만 실행 (불필요한 실행·비용 방지)
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 유료 API 키를 쓰려면 위 줄을 지우고 아래 줄을 쓰세요(둘 중 하나만):
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
