<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>투자지표 — 투자성향 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/meridian.css">
<style>
  .navlink { color: var(--ink-3); cursor: pointer; }
  .navlink:hover { color: var(--ink); text-decoration: none; }
  .opt { display: block; border: 1px solid var(--line-strong); border-radius: var(--radius-md); padding: 14px 16px; margin-top: 10px; cursor: pointer; font-size: 14px; color: var(--ink-2); transition: border-color var(--dur-fast), background var(--dur-fast); }
  .opt:hover { border-color: var(--ink-3); background: var(--paper-2); }
  .opt.sel { border-color: var(--ink); background: var(--paper-2); color: var(--ink); font-weight: 600; }
  .progbar { height: 4px; background: var(--paper-3); border-radius: 2px; overflow: hidden; }
  .progbar > i { display: block; height: 100%; background: var(--ink); transition: width var(--dur-med) var(--ease-out); }
  .tile { flex: 1; min-width: 120px; }
  .tile .v { font-family: var(--font-mono); font-size: 22px; font-weight: 500; margin-top: 6px; }
  input[type=range] { width: 100%; }
</style>
</head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--paper)">

  <header style="height:58px;flex:none;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:26px;padding:0 26px;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30">
    <div style="display:flex;align-items:baseline;gap:8px;flex:none;white-space:nowrap">
      <span style="font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:-0.01em">투자지표</span>
      <span style="font-family:var(--font-mono);font-size:9.5px;color:var(--ink-3);letter-spacing:0.1em;border:1px solid var(--line);padding:1px 5px;border-radius:2px">BETA</span>
    </div>
    <nav style="display:flex;gap:4px;align-items:center;white-space:nowrap">
      <a class="navlink" href="home.html" style="font-size:13.5px;padding:6px 10px">홈</a>
      <a class="navlink" href="stock.html" style="font-size:13.5px;padding:6px 10px">주식 가치평가</a>
      <a class="navlink" href="bond.html" style="font-size:13.5px;padding:6px 10px">채권</a>
      <a class="navlink" href="portfolio.html" style="font-size:13.5px;padding:6px 10px">포트폴리오</a>
      <a class="navlink" href="guide.html" target="_blank" rel="noopener" style="font-size:13.5px;padding:6px 10px">사용설명서 ↗</a>
    </nav>
  </header>

  <main style="flex:1;width:100%;max-width:820px;margin:0 auto;padding:0 30px">

    <section style="padding:44px 0 8px">
      <div class="kick" style="color:var(--dv-navy)">투자성향 테스트 · Risk profile</div>
      <h1 style="font-family:var(--font-display);font-weight:700;font-size:clamp(28px,4vw,40px);letter-spacing:-0.02em;margin:12px 0 0">나는 어떤 투자자일까?</h1>
      <p style="font-size:14px;color:var(--ink-2);line-height:1.7;margin:12px 0 0;max-width:64ch">8개 질문(심리 문항 포함)으로 <b style="color:var(--ink)">위험회피계수 A</b>를 측정하고, 자본시장선(CML) 위에서 <b style="color:var(--ink)">나의 최적 지점</b>을 찾아드립니다. 결과는 브라우저에 저장돼 포트폴리오 페이지에서 재사용됩니다. 약 2분.</p>
    </section>

    <section id="wizard" style="padding:24px 0 60px"></section>
    <section id="result" style="display:none;padding:8px 0 60px"></section>
  </main>

  <footer style="border-top:1px solid var(--line);background:var(--paper-2);padding:20px 30px">
    <div style="max-width:820px;margin:0 auto;font-size:11.5px;color:var(--ink-3);line-height:1.7">ⓘ 본 테스트와 배분 수치는 평균-분산 이론에 기초한 학습용 참고 자료이며, 투자권유·자문이 아닙니다. 실제 투자성향 평가는 금융회사의 공식 절차를 따르세요.</div>
  </footer>
</div>

<script src="assets/test.js"></script>
</body>
</html>
